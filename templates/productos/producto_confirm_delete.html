{% extends 'base.html' %}

{% block title %}Confirmar Eliminación{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center" style="background-color: var(--bg-surface); padding: 3rem; border-radius: 8px; border: 1px solid var(--border-color);">
        
        <i class="fa-solid fa-triangle-exclamation fa-4x mb-4" style="color: var(--accent-red);"></i>
        
        <h2 class="mb-3">¿Estás seguro de que quieres eliminar este producto?</h2>
        
        <p class="mb-4 text-warning" style="font-size: 1.2rem;">
            Se eliminará permanentemente <strong>"{{ object.nombre }}"</strong>.<br>
            Esta acción no se puede deshacer.
        </p>

        <form method="post">
            {% csrf_token %}
            <div class="d-flex justify-content-center gap-3 mt-4">
                <a href="{% url 'producto_list' %}" class="btn btn-outline-custom">
                    <i class="fa-solid fa-xmark"></i> Cancelar
                </a>
                <!-- El script main.js interceptará este botón también -->
                <button type="submit" class="btn btn-danger-custom btn-delete-confirm">
                    <i class="fa-solid fa-trash"></i> Sí, Eliminar Definitivamente
                </button>
            </div>
        </form>

    </div>
</div>
{% endblock %}
